<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes & Reminders</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #cce7ff, #f7f2ff);
        margin: 0;
        padding: 50px;
        color: #333;
    }
    h1 {
        text-align: center;
        color: #4a148c;
        margin-bottom: 20px;
        font-size: 2.5rem;
    }
    .section {
        background: #ffffffcc;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        padding: 40px;
        padding-top: -20px;
        max-width: 500px;
        margin: auto;
        margin-bottom: 20px;
    }
    textarea, input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: 2px solid #4a148c;
    }
    button {
        background-color: #4a148c;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 8px;
        margin-top: 10px;
        cursor: pointer;
    }
    button:hover {
        background-color: #6a1b9a;
    }
    ul {
        list-style: none;
        padding: 0;
        margin-top: 10px;
    }
    li {
        background: #e1bee7;
        padding: 8px;
        margin: 5px 0;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .delete-btn {
        background: #d32f2f;
        color: white;
        border: none;
        padding: 5px 8px;
        border-radius: 5px;
        cursor: pointer;
    }
    .delete-btn:hover {
        background: #b71c1c;
    }
</style>
</head>
<body>
<a href="firstpage.html" class="back-link" style="background:#4a148c; color:white; padding:10px 15px; border-radius:8px; text-decoration:none;">⬅ Back to Home</a>

<h1>Notes & Reminders</h1>
<div style="text-align:center; margin-bottom:20px;">
    <a href="weekly.html" style="background:#4a148c; color:white; padding:10px 15px; border-radius:8px; text-decoration:none;">Back to Weekly Planner</a>
</div>

<!-- Personal Notes -->
<div class="section">
    <h2>Personal Notes</h2>
    <textarea id="notes" rows="6" placeholder="Write your notes here..."></textarea>
    <button onclick="saveNotes()">Save Notes</button>
</div>

<!-- Routine Reminder -->
<div class="section">
    <h2>Set Routine Reminders (Max 5)</h2>
    <input type="text" id="reminderText" placeholder="Reminder text">
    <input type="number" id="reminderTime" placeholder="Time in seconds">
    <button onclick="setReminder()">Set Reminder</button>
    <ul id="reminderList"></ul>
</div>
<script>
    let reminders = [];

    document.addEventListener("DOMContentLoaded", () => {
        // Load personal notes
        const savedNotes = localStorage.getItem("personalNotes");
        if (savedNotes) document.getElementById("notes").value = savedNotes;

        // Load reminders
        const savedReminders = JSON.parse(localStorage.getItem("reminderList")) || [];
        reminders = savedReminders;
        reminders.forEach((reminder, index) => renderReminder(reminder.text, reminder.time, index));
    });

    // Save personal notes
    function saveNotes() {
        const notes = document.getElementById("notes").value;
        localStorage.setItem("personalNotes", notes);
        alert("Notes saved!");
    }

    // Set reminder (limit 5)
    function setReminder() {
        const text = document.getElementById("reminderText").value.trim();
        const time = parseInt(document.getElementById("reminderTime").value) * 1000;

        if (!text || isNaN(time) || time <= 0) {
            return alert("Please enter valid reminder text and time.");
        }

        if (reminders.length >= 5) {
            return alert("You can only set up to 5 reminders.");
        }

        const reminder = { text, time: Date.now() + time };
        reminders.push(reminder);
        saveReminders();
        renderReminder(text, reminder.time, reminders.length - 1);

        setTimeout(() => {
            alert("Reminder: " + text);
        }, time);

        document.getElementById("reminderText").value = "";
        document.getElementById("reminderTime").value = "";
    }

    function renderReminder(text, time, index) {
        const li = document.createElement("li");
        li.innerHTML = `${text} (in ${Math.max(0, Math.round((time - Date.now()) / 1000))}s) 
                        <button class="delete-btn" onclick="deleteReminder(${index})">X</button>`;
        document.getElementById("reminderList").appendChild(li);
    }

    function deleteReminder(index) {
        reminders.splice(index, 1);
        saveReminders();
        refreshReminders();
    }

    function refreshReminders() {
        document.getElementById("reminderList").innerHTML = "";
        reminders.forEach((reminder, i) => renderReminder(reminder.text, reminder.time, i));
    }

    function saveReminders() {
        localStorage.setItem("reminderList", JSON.stringify(reminders));
    }
</script>

</body>
</html>
